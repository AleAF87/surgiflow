<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SurgiFlow - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body class="login-page">
  <main class="login-container">
    <section class="login-box">
      <div class="brand-mark">
        <img src="img/logo.png" alt="SurgiFlow">
      </div>
      <h1 class="h3 mb-1">SurgiFlow</h1>
      <p class="text-muted mb-4">Acesso ao sistema</p>

      <div class="d-grid gap-2">
        <button id="googleLoginBtn" class="btn btn-primary w-100" type="button">
          <i class="fab fa-google me-2"></i>Entrar com Google
        </button>
      </div>

      <div class="login-divider"><span>ou</span></div>

      <a href="cadastro-usuario.html" class="btn btn-outline-primary w-100" data-ignore-spa="true">
        <i class="fab fa-google me-2"></i>Cadastrar com Google
      </a>

      <div id="errorAlert" class="alert alert-danger mt-3 d-none"></div>
      <div id="infoAlert" class="alert alert-info mt-3 d-none"></div>
    </section>
  </main>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
