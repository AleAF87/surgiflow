<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário - SurgiFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body class="login-page">
  <main class="login-container public-register-page">
    <section class="public-register-shell">
      <div class="text-center mb-4">
        <div class="brand-mark mb-3"><img src="img/logo.png" alt="SurgiFlow"></div>
        <h1 class="h3 mb-2">Cadastro de Usuário</h1>
        <p class="text-muted mb-0">Entre com sua conta Google e envie seus dados para aprovação do administrador.</p>
      </div>

      <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">Conta Google</h5></div>
        <div class="card-body">
          <div id="googleAccountBox" class="google-account-box">
            <div>
              <span class="section-label">Aguardando identificação</span>
              <p class="mb-0 text-muted">Use o Google para vincular o cadastro a uma conta segura.</p>
            </div>
            <button id="googleSignupBtn" type="button" class="btn btn-primary">
              <i class="fab fa-google me-2"></i>Entrar com Google
            </button>
          </div>
        </div>
      </div>

      <form id="userSignupForm" novalidate>
        <fieldset id="userSignupFieldset" disabled>
          <div class="card mb-4">
            <div class="card-header"><h5 class="mb-0">Dados pessoais e acesso</h5></div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-12 col-lg-8">
                  <label for="cadastroNome" class="form-label">Nome completo</label>
                  <input id="cadastroNome" name="nome" type="text" class="form-control" autocomplete="name" required>
                </div>
                <div class="col-12 col-lg-4">
                  <label for="cadastroCpf" class="form-label">CPF</label>
                  <input id="cadastroCpf" name="cpf" type="text" class="form-control" maxlength="14" inputmode="numeric" placeholder="000.000.000-00">
                </div>
                <div class="col-12 col-lg-4">
                  <label for="cadastroTelefone" class="form-label">Telefone/WhatsApp</label>
                  <input id="cadastroTelefone" name="telefone" type="text" class="form-control" inputmode="numeric" placeholder="(00) 00000-0000">
                </div>
                <div class="col-12 col-lg-4">
                  <label for="cadastroNivel" class="form-label">Perfil solicitado</label>
                  <select id="cadastroNivel" name="nivelAcesso" class="form-select" required>
                    <option value="3">Médico</option>
                    <option value="4">Secretária</option>
                    <option value="5">Financeiro</option>
                    <option value="6">Hospital</option>
                    <option value="7">Paciente</option>
                  </select>
                </div>
                <div class="col-12 col-lg-4">
                  <label for="cadastroEmail" class="form-label">E-mail Google</label>
                  <input id="cadastroEmail" name="email" type="email" class="form-control" disabled>
                </div>
                <div class="col-12 col-lg-4">
                  <label for="cadastroCrm" class="form-label">CRM, se médico</label>
                  <input id="cadastroCrm" name="crm" type="text" class="form-control">
                </div>
                <div class="col-12 col-lg-8">
                  <label for="cadastroEspecialidade" class="form-label">Especialidade/Setor</label>
                  <input id="cadastroEspecialidade" name="especialidade" type="text" class="form-control">
                </div>
                <div class="col-12">
                  <label for="cadastroObservacoes" class="form-label">Observações</label>
                  <textarea id="cadastroObservacoes" name="observacoes" class="form-control" rows="3"></textarea>
                </div>
              </div>
            </div>
          </div>
        </fieldset>

        <div class="d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center">
          <a href="index.html" class="btn btn-outline-secondary" data-ignore-spa="true">
            <i class="fas fa-arrow-left me-2"></i>Voltar ao login
          </a>
          <button id="submitSignupBtn" type="submit" class="btn btn-primary" disabled>
            <i class="fas fa-paper-plane me-2"></i>Enviar para aprovação
          </button>
        </div>
      </form>

      <div id="signupAlert" class="alert mt-4 d-none"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/cadastro-usuario.js"></script>
</body>
</html>
